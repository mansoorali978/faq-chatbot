version: '3.8'

services:
  backend:
    build:
      context: ./backend
    image: faq-chatbot-backend:latest
    ports:
      - "8000:8000"
    environment:
      - AGENT_MANIFEST_FILE=/app/registries/manifest.hocon
      - AGENT_TOOL_PATH=/app/coded_tools
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000/api/v1
    image: faq-chatbot-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: faq-chatbot-network